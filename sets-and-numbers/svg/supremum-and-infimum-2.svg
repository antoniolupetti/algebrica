<?xml version="1.0" encoding="UTF-8"?>
<svg width="350px" height="260px" viewBox="0 0 350 260" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <g transform="translate(1.000000, 0.000000)">
            <line x1="80.5" y1="64.5" x2="80.5" y2="118.5" stroke="#BABABA" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4"></line>
            <line x1="80.5" y1="132.5" x2="80.5" y2="186.5" stroke="#BABABA" stroke-linecap="round" stroke-linejoin="round"></line>
            <line x1="261.5" y1="132.5" x2="261.5" y2="186.5" stroke="#BABABA" stroke-linecap="round" stroke-linejoin="round"></line>
            <line x1="261.5" y1="64.5" x2="261.5" y2="118.5" stroke="#BABABA" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4"></line>
            <path d="M332.662848,86.5271708 L332.745131,86.5642122 L340.745131,91.0642122 L341.519864,91.5 L340.745131,91.9357878 L332.745131,96.4357878 C332.504452,96.5711697 332.199594,96.4858096 332.064212,96.2451306 C331.943873,96.0311938 331.997947,95.7665479 332.180485,95.6152959 L332.254869,95.5642122 L338.591,92 L0,92 C-0.276142375,92 -0.5,91.7761424 -0.5,91.5 C-0.5,91.2545401 -0.323124839,91.0503916 -0.0898756324,91.0080557 L0,91 L338.591,91 L332.254869,87.4357878 C332.040933,87.3154483 331.949717,87.0612021 332.027171,86.8371522 L332.064212,86.7548694 C332.184552,86.5409325 332.438798,86.4497168 332.662848,86.5271708 Z" fill="#BABABA" fill-rule="nonzero"></path>
            <line x1="134.5" y1="43.5" x2="134.5" y2="83.5" stroke="#BABABA" stroke-linecap="round"></line>
            <text font-size="11" font-weight="normal" line-spacing="13" fill="#636363">
                <tspan x="34.5" y="11">For the open interval A = (0, 1) the supremum and infimum </tspan>
                <tspan x="34.5" y="24">exist but are not attained. No element of  A equals 0 or 1, </tspan>
                <tspan x="34.5" y="37">so the maximum and minimum do not exist.</tspan>
            </text>
            <line x1="134.5" y1="170.5" x2="134.5" y2="216.5" stroke="#BABABA" stroke-linecap="round"></line>
            <text font-size="11" font-weight="normal" line-spacing="13" fill="#636363">
                <tspan x="47.5" y="232">For the closed interval B = [0, 1] the endpoints belong </tspan>
                <tspan x="47.5" y="245">to the set, so the infimum and supremum are attained </tspan>
                <tspan x="47.5" y="258">and coincide with the minimum and maximum.</tspan>
            </text>
            <circle stroke="#333333" fill="#F4EFEE" cx="80.5" cy="92" r="2.5"></circle>
            <circle stroke="#333333" fill="#F4EFEE" cx="261.5" cy="92" r="2.5"></circle>
            <text font-size="12" font-weight="normal" fill="#333333">
                <tspan x="51" y="84">inf A</tspan>
            </text>
            <text font-size="12" font-weight="normal" fill="#333333">
                <tspan x="265" y="84">Sup A</tspan>
            </text>
            <text font-size="12" font-weight="normal" fill="#333333">
                <tspan x="144" y="115"> A = (0,1)</tspan>
            </text>
            <path d="M333.662848,154.527171 L333.745131,154.564212 L341.745131,159.064212 L342.519864,159.5 L341.745131,159.935788 L333.745131,164.435788 C333.504452,164.57117 333.199594,164.48581 333.064212,164.245131 C332.943873,164.031194 332.997947,163.766548 333.180485,163.615296 L333.254869,163.564212 L339.591,160 L1,160 C0.723857625,160 0.5,159.776142 0.5,159.5 C0.5,159.25454 0.676875161,159.050392 0.910124368,159.008056 L1,159 L339.591,159 L333.254869,155.435788 C333.040933,155.315448 332.949717,155.061202 333.027171,154.837152 L333.064212,154.754869 C333.184552,154.540933 333.438798,154.449717 333.662848,154.527171 Z" fill="#BABABA" fill-rule="nonzero"></path>
            <circle stroke="#333333" fill="#333333" cx="80" cy="160" r="2.5"></circle>
            <ellipse stroke="#333333" fill="#333333" cx="261.998" cy="160.003471" rx="2.498" ry="2.5034708"></ellipse>
            <text font-size="12" font-weight="normal" fill="#333333">
                <tspan x="1" y="152">inf A = min A</tspan>
            </text>
            <text font-size="12" font-weight="normal" fill="#333333">
                <tspan x="268" y="152">Sup A = max A</tspan>
            </text>
            <text font-size="12" font-weight="normal" fill="#333333">
                <tspan x="145" y="183"> B = [0,1]</tspan>
            </text>
        </g>
    </g>
</svg>