            <path d="M5.5,97.5 L222.641703,312.911491 M237.092445,327.247087 L256.5,346.5" stroke="#333333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M36,352 L163.914245,100.522334 M174.153412,80.3922722 L183,63" stroke="#333333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            <text font-size="14" font-weight="normal" fill="#BABABA">
                <tspan x="292" y="291">x</tspan>
            </text>
            <text font-size="12" font-weight="normal" fill="#333333">
                <tspan x="124.578" y="206">(2,2)</tspan>
            </text>
            <text font-size="12" font-weight="normal" fill="#333333">
                <tspan x="166.086" y="93">y=2x-2</tspan>
            </text>
            <text font-size="12" font-weight="normal" fill="#333333">
                <tspan x="224.476" y="324">y=-x+4</tspan>
            </text>
            <text font-size="14" font-weight="normal" fill="#BABABA">
                <tspan x="22" y="92">y</tspan>
            </text>
            <text font-size="11" font-weight="normal" line-spacing="13" fill="#636363">
                <tspan x="0" y="11">Since the two lines have different slopes, </tspan>
                <tspan x="0" y="24">they can intersect at only one point, which </tspan>
                <tspan x="0" y="37">guarantees the uniqueness of the solution.</tspan>
            </text>
