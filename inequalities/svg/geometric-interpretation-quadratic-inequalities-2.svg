                <text font-size="11" font-weight="normal" line-spacing="13" fill="#636363">
                    <tspan x="51" y="11">The parabola opens upward because the </tspan>
                    <tspan x="51" y="24">coefficient of x² is positive. It touches the x-</tspan>
                    <tspan x="51" y="37">axis at x = 3, which is a double real root (</tspan>
