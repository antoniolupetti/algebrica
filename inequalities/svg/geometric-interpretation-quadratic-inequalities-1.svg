            </text>
            <text font-size="11" font-weight="normal" line-spacing="13" fill="#636363">
                <tspan x="76" y="11">The parabola opens upward because </tspan>
                <tspan x="76" y="24">the coefficient of x² is positive. It </tspan>
                <tspan x="76" y="37">intersects the x-axis at two distinct </tspan>
                <tspan x="76" y="50">real roots, x = 3 − √2 and x = 3 + √2.</tspan>
            </text>
            <line x1="213.5" y1="58.5" x2="213.5" y2="93.5" stroke="#BABABA" stroke-linecap="round"></line>
