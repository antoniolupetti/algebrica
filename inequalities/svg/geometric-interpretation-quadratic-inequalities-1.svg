            <path d="M265.01789,97.1078381 C267.877084,90.5020141 272.204454,80.1327348 278,66" stroke="#333333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            <text font-size="13" font-weight="normal" line-spacing="13" fill="#333333">
                <tspan x="204" y="113">y = x² - 6x + 7</tspan>
            </text>
