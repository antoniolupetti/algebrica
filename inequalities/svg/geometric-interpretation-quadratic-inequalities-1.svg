            <line x1="138.5" y1="220.5" x2="138.5" y2="211.5" stroke="#BABABA" stroke-linecap="square"></line>
            <line x1="221.5" y1="219.5" x2="221.5" y2="210.5" stroke="#BABABA" stroke-linecap="square"></line>
            <ellipse fill="#333333" cx="81.25" cy="218.755018" rx="2.75" ry="2.75501825"></ellipse>
            <ellipse fill="#333333" cx="197.25" cy="218.755018" rx="2.75" ry="2.75501825"></ellipse>
            <text font-size="11" font-weight="normal" line-spacing="13" fill="#636363">
