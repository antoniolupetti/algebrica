    <g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <g>
            <text font-size="11" font-weight="normal" line-spacing="13" fill="#636363">
                <tspan x="4" y="45">A secant line is a line that </tspan>
                <tspan x="4" y="58">intersects a circle at two </tspan>
                <tspan x="4" y="71">distinct points.</tspan>
            </text>
            <text font-size="11" font-weight="normal" line-spacing="13" fill="#636363">
                <tspan x="107.0625" y="394">A tangent is a line that </tspan>
                <tspan x="83" y="407">touches the circle at exactly </tspan>
                <tspan x="169.501465" y="420">one point</tspan>
            </text>
            <line x1="47.5" y1="85.5" x2="47.5" y2="160.5" stroke="#BABABA" stroke-linecap="round"></line>
            <line x1="193.5" y1="301.5" x2="193.5" y2="376.5" stroke="#BABABA" stroke-linecap="round"></line>
            <text font-size="11" font-weight="normal" line-spacing="13" fill="#636363">
                <tspan x="230.125488" y="12">An external line has no </tspan>
                <tspan x="210" y="25">points in common with the </tspan>
                <tspan x="269.989746" y="38">circumference.</tspan>
            </text>
            <line x1="313.5" y1="52.5" x2="313.5" y2="127.5" stroke="#BABABA" stroke-linecap="round"></line>
