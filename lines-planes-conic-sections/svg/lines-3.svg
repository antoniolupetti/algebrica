            <text font-size="11" font-weight="normal" line-spacing="13" fill="#636363">
                <tspan x="0" y="11">Parallel lines have the same </tspan>
                <tspan x="0" y="24">slope, so their inclinations </tspan>
                <tspan x="0" y="37">are equal: θ = 0.</tspan>
            </text>
