            <text id="The-graph-illustrate" font-family="SegoeUI, Segoe UI" font-size="11" font-weight="normal" line-spacing="13" fill="#636363">
                <tspan x="42" y="12">The graph illustrates the typical end behavior </tspan>
                <tspan x="42" y="25">of an odd–degree polynomial with a positive </tspan>
                <tspan x="42" y="38">leading coefficient: the curve approaches −∞ </tspan>
                <tspan x="42" y="51">as x→−∞ and rises toward +∞ as x→+∞.</tspan>
            </text>
